<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 閃電水電行 ⚡</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #FDF5E6; text-align: center; padding: 15px; color: #333; margin: 0; }
        .shop-container { background: #FFFFFF; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 420px; margin: 20px auto; border: 4px solid #8B4513; }
        #game-screen, #boss-ask-screen, #end-screen { display: none; }
        .welcome-tag { background: #FF7043; color: white; padding: 5px 18px; border-radius: 20px; font-weight: bold; display: inline-block; animation: bounce 2s infinite; margin-bottom: 10px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .note-card { background: #FFF9C4; border-radius: 15px; padding: 12px; text-align: left; margin-bottom: 15px; border: 2px dashed #FBC02D; font-size: 13px; }
        .order-sheet { background: #FAFAFA; border: 2px solid #DEB887; border-radius: 15px; padding: 18px; margin-bottom: 15px; text-align: left; min-height: 85px; position: relative; }
        .btn-primary { background: #4CAF50; color: white; border: none; width: 100%; padding: 16px; font-size: 19px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px #2E7D32; margin-bottom: 10px; outline: none; }
        .btn-primary:disabled { background: #BDC3C7; box-shadow: 0 4px #95A5A6; cursor: not-allowed; opacity: 0.8; }
        .btn-boss { background: #E91E63; box-shadow: 0 4px #AD1457; }
        .btn-skip { background: #90A4AE; box-shadow: 0 4px #546E7A; }
        #feedback { margin-top: 15px; display: none; padding: 15px; border-radius: 15px; border: 2px solid #EEE; }
        .review-card { background: #F1F8E9; border-radius: 15px; padding: 15px; text-align: left; margin-top: 15px; border: 1px solid #C8E6C9; }
        .review-item { margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #E8F5E9; padding-bottom: 8px; }
        .perfect-tag { color: #2E7D32; font-weight: bold; background: #C8E6C9; padding: 3px 8px; border-radius: 6px; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="shop-container">
        
        <div id="start-screen">
            <div class="welcome-tag">🔔 老闆好！新報修單來了</div>
            <h2 style="color: #8B4513;">⚡ 閃電水電行 ⚡</h2>
            <p>今日有 3 位預約客戶，請準備營業！</p>
            <button class="btn-primary" onclick="startGame()">➔ 開始營業</button>
        </div>

        <div id="game-screen">
            <div class="note-card">💡 <b>老闆隨身筆記：</b><br>● 電池並聯：體力變久 | ● 電池串聯：力量變強<br>● 燈泡並聯：各自亮亮 | ● 燈泡串聯：分電變暗</div>
            <div class="order-sheet"><b id="cName"></b><p id="cDesc"></p></div>
            <div style="text-align:left; background:#F5F5F5; padding:15px; border-radius:15px; margin-bottom:15px;">
                電池接法：<select id="bat" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;">
                    <option value="串聯">串聯「一條龍」</option>
                    <option value="並聯">並聯「排排站」</option>
                </select>
                燈泡接法：<select id="bul" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
                    <option value="串聯">串聯「分著用」</option>
                    <option value="並聯">並聯「自己用」</option>
                </select>
            </div>
            <button id="mainBtn" class="btn-primary" onclick="goWork()">確認派工！</button>
            <div id="feedback">
                <span id="starOutput" style="font-size: 30px;"></span>
                <p id="msgOutput" style="font-weight:bold;"></p>
                <button id="nextBtn" class="btn-primary" style="background:#8B4513;" onclick="nextStep()">下一位客人 ➔</button>
            </div>
        </div>

        <div id="boss-ask-screen">
            <div style="font-size: 50px;">🔥</div>
            <h2>隱藏挑戰出現！</h2>
            <p style="background:#FFF3E0; padding:15px; border-radius:15px;">有個大客戶「超級歌手」指名要老闆處理演唱會電路，要挑戰嗎？</p>
            <button class="btn-primary btn-boss" onclick="startBoss()">🔥 接受挑戰 (魔王關)</button>
            <button class="btn-primary btn-skip" onclick="showEnd()">直接收工結算</button>
        </div>

        <div id="end-screen">
            <div style="font-size: 55px;">🏆</div>
            <h2 id="finalRank"></h2>
            <p>今日營業回顧：</p>
            <div id="reviewList" class="review-card"></div>
            <button class="btn-primary" style="background:#546E7A;" onclick="location.reload()">重新開張</button>
        </div>
    </div>

    <script>
        // 核心邏輯資料庫
        const missionDb = {
            "阿嬤的鬧鐘": { logic: "電池並聯：增加總電量，跑更久。", target: { bat: "並聯" }, win: "「太專業了！」王阿嬤送你一包茶葉！", lose: "「老闆...鬧鐘兩天就停了。」" },
            "小明的賽車": { logic: "電池串聯：疊加電壓，速度最快。", target: { bat: "串聯" }, win: "「衝啊！」小明拿了第一名！", lose: "「老闆，這速度慢死了...」" },
            "陳伯伯": { logic: "燈泡並聯：各路徑獨立，不怕斷路。", target: { bul: "並聯" }, win: "「太安心了！」壞一顆另一顆仍亮。", lose: "「一顆燈壞全家黑，我差點絆倒。」" },
            "林阿姨": { logic: "燈泡串聯：平分電壓，光線變柔和。", target: { bul: "串聯" }, win: "「就是這個光！」溫馨不刺眼。", lose: "「太亮了！眼睛快瞎了。」" },
            "外送員阿強": { logic: "電池並聯：持久接法，亮整晚跑單。", target: { bat: "並聯" }, win: "「謝啦老闆！」跑宵夜場超放心。", lose: "「老闆，跑一半燈就熄了。」" },
            "警衛大叔": { logic: "電池串聯：提高電壓讓光射更遠。", target: { bat: "串聯" }, win: "「太亮了！」連小貓都看得到。", lose: "「老闆，這光照不到十步遠。」" },
            "科展同學": { logic: "燈泡串聯：分電變暗，符合實驗觀察。", target: { bul: "串聯" }, win: "「報告拿高分！」實驗結果非常正確。", lose: "「老闆，這亮度跟並聯一樣強？」" },
            "演唱會歌手": { logic: "最強組合：電池串聯(增壓) + 燈泡並聯(最強亮度)。", target: { bat: "串聯", bul: "並聯" }, win: "「震撼全場！」最強光芒讓觀眾瘋狂！", middle: "「還可以，但總覺得能再精進？」", lose: "「這燈光微弱到像在過清明節？」" }
        };

        const allClients = [
            { id: "阿嬤的鬧鐘", name: "王阿嬤", desc: "「鬧鐘電池很快就沒電，幫我撐久一點！」" },
            { id: "小明的賽車", name: "頑皮小明", desc: "「我的賽車速度慢死了，給我最強爆發力！」" },
            { id: "陳伯伯", name: "陳伯伯", desc: "「裝兩顆燈泡，其中一顆壞掉另一顆不能熄！」" },
            { id: "林阿姨", name: "林阿姨", desc: "「走廊燈太刺眼，能不能讓光線柔和一點？」" },
            { id: "外送員阿強", name: "外送員阿強", desc: "「外送箱的燈要亮很久，請幫我用最持久的接法！」" },
            { id: "警衛大叔", name: "警衛大叔", desc: "「巡邏手電筒要射超遠，幫我加強電力！」" },
            { id: "科展同學", name: "科展同學", desc: "「我想讓兩顆燈泡平分電壓變暗。」" }
        ];

        let clients = [], currentIdx = 0, score = 0, gameLog = [], isBossLevel = false;

        function startGame() {
            clients = allClients.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadClient();
        }

        function loadClient() {
            const c = clients[currentIdx];
            document.getElementById('cName').innerText = "報修單：" + c.name;
            document.getElementById('cDesc').innerText = c.desc;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').innerText = "確認派工！";
        }

        // 修正原本導致錯誤的 goWork 函式，現在不呼叫 google.script.run
        function goWork() {
            const batVal = document.getElementById('bat').value;
            const bulVal = document.getElementById('bul').value;
            const currentId = clients[currentIdx].id;
            const m = missionDb[currentId];
            
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('mainBtn').innerText = "工程處理中...";

            setTimeout(() => {
                let isSuccess = false, star = "⭐", responseText = "";

                if (currentId === "演唱會歌手") {
                    if (batVal === m.target.bat && bulVal === m.target.bul) { isSuccess = true; responseText = m.win; star = "⭐⭐⭐"; }
                    else if (batVal === m.target.bat || bulVal === m.target.bul) { responseText = m.middle; star = "⭐⭐"; }
                    else { responseText = m.lose; star = "⭐"; }
                } else {
                    const isBatOk = m.target.bat ? (batVal === m.target.bat) : true;
                    const isBulOk = m.target.bul ? (bulVal === m.target.bul) : true;
                    if (isBatOk && isBulOk) { isSuccess = true; responseText = m.win; star = "⭐⭐⭐"; }
                    else { responseText = m.lose; star = "⭐"; }
                }

                if(isSuccess) score++;
                gameLog.push({ name: clients[currentIdx].name, logic: m.logic, perfect: isSuccess });

                document.getElementById('starOutput').innerText = star;
                document.getElementById('msgOutput').innerText = responseText;
                document.getElementById('feedback').style.display = 'block';
            }, 800);
        }

        function nextStep() {
            if (isBossLevel) { showEnd(); return; }
            if (currentIdx < 2) {
                currentIdx++;
                loadClient();
            } else {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('boss-ask-screen').style.display = 'block';
            }
        }

        function startBoss() {
            isBossLevel = true;
            clients.push({ id: "演唱會歌手", name: "隱藏魔王：演唱會歌手", desc: "「我要最強電壓搭配燈泡最高亮度，震撼全場！」" });
            currentIdx = 3;
            document.getElementById('boss-ask-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('nextBtn').innerText = "看結算回顧 ➔";
            loadClient();
        }

        function showEnd() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('boss-ask-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            
            let rank = "熱血水電學徒";
            if(score >= 4) rank = "🏆 閃電水電神之手";
            else if(score >= 2) rank = "🥈 資深維修大師";
            
            document.getElementById('finalRank').innerText = rank;
            let html = "";
            gameLog.forEach(item => {
                const status = item.perfect ? "✅" : "❌";
                html += `<div class="review-item">${status} <b>${item.name}：</b><br>${item.logic}</div>`;
            });
            document.getElementById('reviewList').innerHTML = html;
        }
    </script>
</body>
</html>
