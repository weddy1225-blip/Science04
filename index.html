<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 閃電水電行：傳統燈泡專修店 ⚡</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #FFF8E1; text-align: center; padding: 15px; color: #333; margin: 0; }
        .shop-container { background: #FFFFFF; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 420px; margin: 20px auto; border: 4px solid #5D4037; }
        #game-screen, #boss-ask-screen, #end-screen { display: none; }
        .welcome-tag { background: #FB8C00; color: white; padding: 5px 18px; border-radius: 20px; font-weight: bold; display: inline-block; animation: bounce 2s infinite; margin-bottom: 10px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        /* 筆記卡片：優化對齊樣式 */
        .note-card { 
            background: #FFF9C4; 
            border-radius: 15px; 
            padding: 15px; 
            text-align: left; 
            margin-bottom: 15px; 
            border: 2px dashed #FBC02D; 
            font-size: 13px; 
            color: #795548; 
        }
        .note-title { margin-bottom: 8px; display: block; font-weight: bold; }
        .note-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 分為左右兩欄 */
            gap: 8px 10px; /* 上下左右間距 */
        }
        .note-item { display: flex; align-items: flex-start; }
        .note-dot { color: #8D6E63; margin-right: 5px; flex-shrink: 0; }

        .order-sheet { background: #FAFAFA; border: 2px solid #D7CCC8; border-radius: 15px; padding: 18px; margin-bottom: 15px; text-align: left; min-height: 85px; position: relative; }
        .btn-primary { background: #43A047; color: white; border: none; width: 100%; padding: 16px; font-size: 19px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px #2E7D32; margin-bottom: 10px; outline: none; transition: 0.2s; }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px #2E7D32; }
        .btn-primary:disabled { background: #BDC3C7; box-shadow: 0 4px #95A5A6; cursor: not-allowed; opacity: 0.8; }
        .btn-boss { background: #E53935; box-shadow: 0 4px #B71C1C; }
        .btn-skip { background: #78909C; box-shadow: 0 4px #455A64; }
        
        #feedback { margin-top: 15px; display: none; padding: 15px; border-radius: 15px; background: #FFF3E0; border: 2px solid #FFE0B2; }
        .review-card { background: #F1F8E9; border-radius: 15px; padding: 15px; text-align: left; margin-top: 15px; border: 1px solid #C8E6C9; }
        .review-item { margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #E8F5E9; padding-bottom: 8px; }
        
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #D7CCC8; background: white; font-size: 16px; }
        b { color: #5D4037; }
    </style>
</head>
<body>
    <div class="shop-container">
        <!-- 開始畫面 -->
        <div id="start-screen">
            <div class="welcome-tag">💡 老闆好！鎢絲燈泡到貨了</div>
            <h2 style="color: #5D4037;">⚡ 閃電水電行 ⚡<br><span style="font-size: 16px; color: #8D6E63;">(傳統燈泡維修專門店)</span></h2>
            <p>今日有 3 位預約客戶，請準備營業！</p>
            <button class="btn-primary" onclick="startGame()">➔ 開始營業</button>
        </div>

        <!-- 遊戲畫面 -->
        <div id="game-screen">
            <div class="note-card">
                <span class="note-title">💡 老闆隨身筆記（傳統燈泡篇）：</span>
                <div class="note-grid">
                    <div class="note-item"><span class="note-dot">●</span>電池並聯：撐更久</div>
                    <div class="note-item"><span class="note-dot">●</span>電池串聯：強更亮</div>
                    <div class="note-item"><span class="note-dot">●</span>燈泡並聯：各自亮</div>
                    <div class="note-item"><span class="note-dot">●</span>燈泡串聯：分電暗</div>
                </div>
            </div>
            <div class="order-sheet"><b id="cName"></b><p id="cDesc"></p></div>
            
            <div style="text-align:left; background:#F5F5F5; padding:15px; border-radius:15px; margin-bottom:15px;">
                電池接法：
                <select id="bat">
                    <option value="串聯">串聯「增加電壓」</option>
                    <option value="並聯">並聯「增加電量」</option>
                </select>
                傳統燈泡接法：
                <select id="bul">
                    <option value="串聯">串聯「平分亮度」</option>
                    <option value="並聯">並聯「全力發光」</option>
                </select>
            </div>
            
            <button id="mainBtn" class="btn-primary" onclick="goWork()">確認派工！</button>
            
            <div id="feedback">
                <span id="starOutput" style="font-size: 35px;"></span>
                <p id="msgOutput" style="font-weight:bold; color: #E65100;"></p>
                <button id="nextBtn" class="btn-primary" style="background:#5D4037; box-shadow: 0 4px #3E2723;" onclick="nextStep()">下一位客人 ➔</button>
            </div>
        </div>

        <!-- 魔王挑戰、結算等畫面保持原本邏輯 -->
        <div id="boss-ask-screen">
            <div style="font-size: 50px;">💡</div>
            <h2>隱藏挑戰出現！</h2>
            <p style="background:#FFFDE7; padding:15px; border-radius:15px; border: 1px solid #FFF59D;">有個大客戶「超級歌手」指名要用數百顆<b>傳統鎢絲燈泡</b>佈置演唱會，要挑戰最高難度的配置嗎？</p>
            <button class="btn-primary btn-boss" onclick="startBoss()">🔥 接受挑戰 (魔王關)</button>
            <button class="btn-primary btn-skip" onclick="showEnd()">直接收工結算</button>
        </div>

        <div id="end-screen">
            <div style="font-size: 55px;">🏆</div>
            <h2 id="finalRank"></h2>
            <p>今日營業回顧：</p>
            <div id="reviewList" class="review-card"></div>
            <button class="btn-primary" style="background:#546E7A; box-shadow: 0 4px #37474F;" onclick="location.reload()">重新開張</button>
        </div>
    </div>

    <script>
        // 核心邏輯保持不變
        const missionDb = {
            "阿嬤的鬧鐘": { logic: "電池並聯：增加總電量，讓設備跑更久。", target: { bat: "並聯" }, win: "「太專業了！」王阿嬤說鬧鐘很久沒換電池了！", lose: "「老闆...傳統電池一下子就沒電了。」" },
            "小明的賽車": { logic: "電池串聯：疊加電壓，傳統馬達速度最快。", target: { bat: "串聯" }, win: "「衝啊！」小明的傳統馬達賽車跑第一！", lose: "「老闆，電壓不夠馬達轉不動啊...」" },
            "陳伯伯": { logic: "傳統燈泡並聯：路徑獨立，燒斷一顆另一顆仍會亮。", target: { bul: "並聯" }, win: "「太安心了！」壞了一顆燈泡，走廊還是亮的。", lose: "「傳統燈泡串聯太危險，一顆壞掉全家變黑！」" },
            "林阿姨": { logic: "傳統燈泡串聯：電壓被平分，光線柔和不刺眼。", target: { bul: "串聯" }, win: "「這就是黃光的溫馨感！」傳統燈泡變柔和了。", lose: "「傳統燈泡並聯太亮了！客廳像被閃光彈閃到。」" },
            "外送員阿強": { logic: "電池並聯：增加續航力，讓傳統燈泡亮整晚。", target: { bat: "並聯" }, win: "「謝啦老闆！」傳統鎢絲燈亮一整晚也沒熄。", lose: "「老闆，跑一半傳統燈泡就沒電了。」" },
            "警衛大叔": { logic: "電池串聯：提高電壓讓傳統手電筒射更遠。", target: { bat: "串聯" }, win: "「太亮了！」傳統手電筒發出強烈黃光！", lose: "「老闆，這光像燭火一樣微弱...」" },
            "科展同學": { logic: "傳統燈泡串聯：電壓平分後亮度明顯變暗。", target: { bul: "串聯" }, win: "「數據正確！」精準觀察到傳統燈泡的變暗現象。", lose: "「老闆，這傳統燈泡亮度跟並聯一樣強？」" },
            "演唱會歌手": { logic: "電池串聯(增壓) + 傳統燈泡並聯(最強亮度)。", target: { bat: "串聯", bul: "並聯" }, win: "「震撼全場！」上百顆鎢絲燈泡發出最強光芒！", middle: "「亮度普通，潛力沒被發揮？」", lose: "「這燈光昏暗到像在演恐怖片？」" }
        };

        const allClients = [
            { id: "阿嬤的鬧鐘", name: "王阿嬤", desc: "「鬧鐘電池很快就沒電，幫我撐久一點！」" },
            { id: "小明的賽車", name: "頑皮小明", desc: "「我的賽車速度慢死了，給我最強爆發力！」" },
            { id: "陳伯伯", name: "陳伯伯", desc: "「幫我裝兩顆傳統燈泡，壞一顆另一顆絕不能熄！」" },
            { id: "林阿姨", name: "林阿姨", desc: "「傳統燈泡太刺眼了，能不能讓光線柔和一點？」" },
            { id: "外送員阿強", name: "外送員阿強", desc: "「外送箱的燈要亮很久，請幫我用最持久的接法！」" },
            { id: "警衛大叔", name: "警衛大叔", desc: "「巡邏手電筒要射超遠，幫我用傳統燈泡加強火力！」" },
            { id: "科展同學", name: "科展同學", desc: "「我想實驗傳統燈泡如何平分電壓並變暗。」" }
        ];

        let clients = [], currentIdx = 0, score = 0, gameLog = [], isBossLevel = false;

        function startGame() {
            clients = allClients.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadClient();
        }

        function loadClient() {
            const c = clients[currentIdx];
            document.getElementById('cName').innerText = "報修單：" + c.name;
            document.getElementById('cDesc').innerText = c.desc;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').innerText = "確認派工！";
        }

        function goWork() {
            const batVal = document.getElementById('bat').value;
            const bulVal = document.getElementById('bul').value;
            const currentId = clients[currentIdx].id;
            const m = missionDb[currentId];
            
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('mainBtn').innerText = "鎢絲加熱處理中...";

            setTimeout(() => {
                let isSuccess = false, star = "⭐", responseText = "";

                if (currentId === "演唱會歌手") {
                    if (batVal === m.target.bat && bulVal === m.target.bul) { isSuccess = true; responseText = m.win; star = "⭐⭐⭐"; }
                    else if (batVal === m.target.bat || bulVal === m.target.bul) { responseText = m.middle; star = "⭐⭐"; }
                    else { responseText = m.lose; star = "⭐"; }
                } else {
                    const isBatOk = m.target.bat ? (batVal === m.target.bat) : true;
                    const isBulOk = m.target.bul ? (bulVal === m.target.bul) : true;
                    if (isBatOk && isBulOk) { isSuccess = true; responseText = m.win; star = "⭐⭐⭐"; }
                    else { responseText = m.lose; star = "⭐"; }
                }

                if(isSuccess) score++;
                gameLog.push({ name: clients[currentIdx].name, logic: m.logic, perfect: isSuccess });

                document.getElementById('starOutput').innerText = star;
                document.getElementById('msgOutput').innerText = responseText;
                document.getElementById('feedback').style.display = 'block';
            }, 800);
        }

        function nextStep() {
            if (isBossLevel) { showEnd(); return; }
            if (currentIdx < 2) {
                currentIdx++;
                loadClient();
            } else {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('boss-ask-screen').style.display = 'block';
            }
        }

        function startBoss() {
            isBossLevel = true;
            clients.push({ id: "演唱會歌手", name: "隱藏魔王：演唱會歌手", desc: "「我要傳統燈泡的最強亮點，給觀眾最震撼的視覺！」" });
            currentIdx = 3;
            document.getElementById('boss-ask-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('nextBtn').innerText = "看結算回顧 ➔";
            loadClient();
        }

        function showEnd() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('boss-ask-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            
            let rank = "傳統電路學徒";
            if(score >= 4) rank = "🏆 閃電鎢絲燈大師";
            else if(score >= 2) rank = "🥈 專業維修技師";
            
            document.getElementById('finalRank').innerText = rank;
            let html = "";
            gameLog.forEach(item => {
                const status = item.perfect ? "✅" : "❌";
                html += `<div class="review-item">${status} <b>${item.name}：</b><br>${item.logic}</div>`;
            });
            document.getElementById('reviewList').innerHTML = html;
        }
    </script>
</body>
</html>
